<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — AFM 274 Corporate Finance Studio</title>
<style>
  :root{
    --ink:#0F2036;
    --ink-2:#16304F;
    --paper:#FFFFFF;
    --paper-2:#F3F5F8;
    --line:#DDE2E9;
    --text:#1B2430;
    --text-dim:#5B6472;
    --gain:#1E7A5F;
    --gain-bg:#E7F3EE;
    --loss:#B3432E;
    --loss-bg:#FBEAE6;
    --gold:#B8862E;
    --gold-bg:#FBF2E1;
    --serif:'Iowan Old Style','Palatino Linotype','Book Antiqua',Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-2);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex;min-height:100vh;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:252px;
    flex:0 0 252px;
    background:var(--ink);
    color:#EAF0F7;
    padding:22px 16px 24px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .brand{
    padding:2px 6px 18px;
    border-bottom:1px solid rgba(255,255,255,0.12);
    margin-bottom:16px;
  }
  .brand .mark{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.16em;
    color:#9FC7B6;
    text-transform:uppercase;
  }
  .brand h1{
    font-family:var(--serif);
    font-size:22px;
    font-weight:600;
    margin:4px 0 2px;
    line-height:1.15;
  }
  .brand p{
    font-size:11.5px;
    color:#9FB0C4;
    margin:0;
  }
  .nav-group-label{
    font-size:10.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:#7C93AC;
    margin:18px 8px 8px;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 10px;
    border-radius:8px;
    cursor:pointer;
    color:#D8E2EE;
    font-size:13.5px;
    margin-bottom:2px;
    transition:background .12s ease;
  }
  .nav-item .chip{
    font-family:var(--mono);
    font-size:11px;
    width:26px;
    height:26px;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.08);
    color:#BFD3E5;
    flex:0 0 auto;
  }
  .nav-item:hover{background:rgba(255,255,255,0.07);}
  .nav-item.active{background:#1F6F54;color:#fff;}
  .nav-item.active .chip{background:rgba(255,255,255,0.22);color:#fff;}
  .nav-item .lbl{flex:1;}
  .nav-item .lbl small{display:block;color:#8FA3B8;font-size:10.5px;margin-top:1px;}
  .nav-item.active .lbl small{color:#CFE9DE;}

  .side-foot{
    margin-top:22px;
    padding:12px 10px;
    border-top:1px solid rgba(255,255,255,0.12);
    font-size:11.5px;
    color:#8098B0;
    line-height:1.5;
  }

  /* ---------- Main ---------- */
  .main{flex:1;min-width:0;padding:36px 44px 80px;max-width:980px;}
  .crumbs{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;}
  .page-head h2{font-family:var(--serif);font-size:32px;margin:0 0 6px;line-height:1.15;}
  .page-head p.dek{color:var(--text-dim);font-size:15px;max-width:640px;margin:0 0 24px;line-height:1.5;}

  .tabbar{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:26px;}
  .tabbtn{
    font-family:var(--sans);
    font-size:13.5px;
    font-weight:600;
    color:var(--text-dim);
    background:none;
    border:none;
    padding:10px 4px;
    margin-right:20px;
    cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .tabbtn.active{color:var(--ink);border-bottom-color:var(--gold);}

  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:20px 22px;
    margin-bottom:16px;
  }
  .concept-card h3{
    font-family:var(--serif);
    font-size:17px;
    margin:0 0 8px;
    color:var(--ink-2);
  }
  .concept-card p{font-size:14px;line-height:1.65;margin:0;color:var(--text);}
  .concept-card p + p{margin-top:8px;}

  .formula-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
    padding:12px 0;
    border-bottom:1px dashed var(--line);
  }
  .formula-row:last-child{border-bottom:none;}
  .formula-row .fname{font-size:13.5px;color:var(--text-dim);max-width:270px;}
  .formula-row .fexpr{
    font-family:var(--mono);
    font-size:14.5px;
    color:var(--ink-2);
    text-align:right;
    white-space:nowrap;
  }

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
  .ptype{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 16px 14px;
    cursor:pointer;
    transition:border-color .12s ease, transform .12s ease;
  }
  .ptype:hover{border-color:var(--gold);transform:translateY(-1px);}
  .ptype .num{
    font-family:var(--mono);
    font-size:10.5px;
    color:#98A5B4;
    letter-spacing:.08em;
  }
  .ptype h4{font-family:var(--serif);font-size:15.5px;margin:6px 0 6px;color:var(--ink-2);}
  .ptype p{font-size:12.5px;color:var(--text-dim);margin:0;line-height:1.5;}

  .problem-panel{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:24px 26px;}
  .problem-panel .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
  .problem-panel .prompt{font-size:15.5px;line-height:1.7;color:var(--text);margin-bottom:18px;}
  .prompt b{color:var(--ink);}
  .answer-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .answer-row input[type=text], .answer-row input[type=number]{
    font-family:var(--mono);
    font-size:15px;
    padding:9px 12px;
    border:1.5px solid var(--line);
    border-radius:7px;
    width:180px;
    background:var(--paper-2);
  }
  .answer-row input:focus{outline:none;border-color:var(--ink-2);}
  .unit{font-size:13px;color:var(--text-dim);}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  button.btn{
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    padding:9px 15px;
    border-radius:7px;
    border:1px solid var(--line);
    background:var(--paper);
    cursor:pointer;
    color:var(--ink);
  }
  button.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  button.btn.primary:hover{background:var(--ink-2);}
  button.btn:hover{border-color:#B7C0CC;}
  button.btn.ghost{background:transparent;}

  .feedback{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:14px;display:none;}
  .feedback.correct{background:var(--gain-bg);color:var(--gain);display:block;}
  .feedback.wrong{background:var(--loss-bg);color:var(--loss);display:block;}

  .solution{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;display:none;}
  .solution.open{display:block;}
  .solution ol{margin:0;padding-left:20px;}
  .solution li{font-size:14px;line-height:1.7;margin-bottom:8px;color:var(--text);}
  .solution li .work{font-family:var(--mono);color:var(--ink-2);}
  .solution .final{
    margin-top:10px;
    font-family:var(--mono);
    font-size:14.5px;
    background:var(--gold-bg);
    color:#7A5A16;
    padding:10px 12px;
    border-radius:7px;
  }

  .back-link{font-size:13px;color:var(--text-dim);cursor:pointer;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px;}
  .back-link:hover{color:var(--ink);}

  /* Quiz */
  .quiz-progress{font-family:var(--mono);font-size:12px;color:var(--text-dim);margin-bottom:10px;}
  .quiz-q{font-size:16px;font-family:var(--serif);color:var(--ink);margin-bottom:16px;line-height:1.5;}
  .choice{
    display:block;width:100%;text-align:left;
    background:var(--paper);border:1.5px solid var(--line);border-radius:8px;
    padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:14px;color:var(--text);
    font-family:var(--sans);
  }
  .choice:hover{border-color:var(--ink-2);}
  .choice.correct{background:var(--gain-bg);border-color:var(--gain);color:#125140;}
  .choice.wrong{background:var(--loss-bg);border-color:var(--loss);color:#7c2c1c;}
  .choice[disabled]{cursor:default;}
  .quiz-explain{font-size:13.5px;color:var(--text-dim);background:var(--paper-2);padding:12px 14px;border-radius:8px;margin-top:10px;line-height:1.6;display:none;}
  .quiz-explain.open{display:block;}
  .quiz-score{
    font-family:var(--mono);font-size:13px;color:var(--ink-2);
    background:var(--paper-2);padding:8px 12px;border-radius:7px;display:inline-block;margin-bottom:16px;
  }

  .home-hero{
    background:linear-gradient(135deg,#0F2036 0%,#1A3A5C 100%);
    color:#fff;border-radius:14px;padding:38px 40px;margin-bottom:26px;
  }
  .home-hero .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:#8FC9AC;text-transform:uppercase;margin-bottom:10px;}
  .home-hero h2{font-family:var(--serif);font-size:34px;margin:0 0 12px;line-height:1.2;}
  .home-hero p{font-size:15px;color:#C9D6E4;max-width:600px;line-height:1.6;margin:0;}
  .home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .home-card{
    background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px 20px;cursor:pointer;
  }
  .home-card:hover{border-color:var(--gold);}
  .home-card .chip{
    font-family:var(--mono);font-size:11px;width:30px;height:30px;border-radius:7px;
    background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:10px;
  }
  .home-card h4{font-family:var(--serif);font-size:16.5px;margin:0 0 6px;color:var(--ink-2);}
  .home-card p{font-size:12.5px;color:var(--text-dim);margin:0;line-height:1.55;}

  .mix-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--gold-bg);color:#7A5A16;border:1px solid #E9CE8F;
    padding:9px 16px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:4px;
  }
  .mix-btn:hover{background:#F7E7C4;}

  ::selection{background:#CFE9DE;}
  @media (max-width:820px){
    .app{flex-direction:column;}
    .sidebar{width:100%;flex:none;height:auto;position:relative;}
    .main{padding:24px 18px 60px;max-width:100%;}
  }
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<script>
/* =========================================================
   HELPERS
   ========================================================= */
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function randFloat(min,max,decimals){
  const v = Math.random()*(max-min)+min;
  const f = Math.pow(10,decimals);
  return Math.round(v*f)/f;
}
function choice(arr){return arr[randInt(0,arr.length-1)];}
function fmt(n,decimals){
  if(decimals===undefined) decimals=2;
  if(n===null||n===undefined||isNaN(n)) return '—';
  return n.toLocaleString('en-US',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}
function pct(n,decimals){ if(decimals===undefined) decimals=2; return fmt(n*100,decimals)+'%'; }
function money(n,decimals){ if(decimals===undefined) decimals=2; const s = n<0?'-':''; return s+'$'+fmt(Math.abs(n),decimals); }

/* =========================================================
   CHAPTER DATA: concepts + formulas
   ========================================================= */
const CHAPTERS = [
{
  id:17, roman:'XVII', title:'Capital Structure in a Perfect Market',
  subtitle:'MM Proposition I & II, WACC, leverage & beta — Text Ch. 17',
  concepts:[
    {h:'The capital structure pie', p:['Capital structure is the mix of financing instruments a firm uses. With just debt and equity, firm value is V = D + E, where D is the market value of debt and E the market value of equity.',
      'Two central questions: what happens to the cost of financing as the mix changes, and is there an optimal mix?']},
    {h:'Perfect capital markets', p:['MM\'s analysis rests on three assumptions: (1) investors and firms trade the same securities at prices equal to the present value of future cash flows; (2) there are no taxes, transaction costs, or issuance costs; (3) a firm\'s financing choices don\'t change the cash flows generated by its investments or reveal new information about them.']},
    {h:'MM Proposition I', p:['In a perfect capital market, total firm value equals the market value of the cash flows generated by its assets and is unaffected by capital structure: V_U = V_L.',
      'This rests on the no-arbitrage principle — if two portfolios produce identical payoffs, they must have the same price today. If E_L is mispriced relative to V_U − D, you can construct a portfolio of L\'s debt and equity (or a levered position in U) to arbitrage the difference.']},
    {h:'Homemade leverage', p:['If a firm doesn\'t use the leverage an investor wants, the investor can borrow personally and buy shares — "homemade leverage" — to replicate the payoff of a levered position. This is why capital structure is irrelevant to investors in perfect markets: they can undo or recreate any choice the firm makes.']},
    {h:'MM Proposition II', p:['Leverage increases the expected return on equity, but also its risk. Since pretax WACC (r_U) doesn\'t depend on capital structure, r_E must rise with leverage to compensate: r_E = r_U + (D/E)(r_U − r_D).',
      'A firm\'s WACC in a perfect market equals r_U regardless of the debt/equity split — using more "cheap" debt does not lower WACC, because it makes remaining equity riskier and more expensive.']},
    {h:'Unlevering and relevering beta', p:['The asset (unlevered) beta measures the risk of operations, independent of financing: β_U = β_E·E/(D+E) + β_D·D/(D+E). If debt is close to risk-free, β_D ≈ 0.',
      'When leverage changes, β_U stays fixed but β_E moves with it — exactly analogous to MM Proposition II.']},
    {h:'Net debt', p:['Cash and risk-free securities on the balance sheet act like negative debt — they reduce the risk of the firm\'s assets. To isolate the risk of operations, leverage should be measured using net debt = debt − cash, and enterprise value = D + E − Cash.']},
    {h:'Two common fallacies', p:['Fallacy 1: leverage raises expected EPS, so it must raise the share price. Wrong — higher expected EPS comes with higher risk, and the discount rate rises too.',
      'Fallacy 2: issuing equity dilutes value because cash flow is spread over more shares. Wrong — new shares are issued for cash of equal value, so there\'s no dilution in a perfect market: the pie gets bigger by exactly what was paid in.']}
  ],
  formulas:[
    {n:'Firm value', e:'V = D + E'},
    {n:'MM Proposition I', e:'V_U = V_L'},
    {n:'Cost of equity (CAPM)', e:'r_E = r_f + β_E(r_M − r_f)'},
    {n:'Unlevered / asset cost of capital', e:'r_U = (E/V)r_E + (D/V)r_D'},
    {n:'MM Proposition II', e:'r_E = r_U + (D/E)(r_U − r_D)'},
    {n:'WACC (no taxes)', e:'r_wacc = (E/V)r_E + (D/V)r_D = r_U'},
    {n:'Unlevered beta', e:'β_U = β_E · E/(D+E)'},
    {n:'Enterprise value (net debt)', e:'EV = D + E − Cash'}
  ],
  mcq:[
    {q:'Under MM Proposition I in a perfect capital market, the total value of a firm is determined primarily by:',
     choices:['Its choice between debt and equity financing','The market value of the cash flows generated by its assets','Its dividend policy','The number of shares outstanding'],
     correct:1, explain:'MM I says financing is a "slicing of the pie" — it doesn\'t change the size of the pie, which is set by the cash flows the assets generate.'},
    {q:'Which of these is NOT one of the standard "perfect capital markets" assumptions?',
     choices:['No taxes, transaction costs, or issuance costs','Investors and firms trade the same securities at competitive prices equal to PV of cash flows','Financing decisions don\'t change investment cash flows or reveal new information','Firms can always borrow at subsidized, below-market interest rates'],
     correct:3, explain:'Subsidized borrowing is a market imperfection, not a perfect-markets assumption — MM explicitly assumes securities are fairly priced and there are no special financing advantages.'},
    {q:'As a firm\'s debt-equity ratio rises (holding r_D roughly fixed and no default risk), MM Proposition II implies that r_E:',
     choices:['Falls, since debt is cheaper','Stays exactly the same','Rises, to compensate equity holders for added financial risk','Becomes negative'],
     correct:2, explain:'r_E = r_U + (D/E)(r_U − r_D). As D/E rises, the extra risk term grows, pushing r_E up.'},
    {q:'In perfect capital markets, a firm\'s pretax WACC as leverage increases:',
     choices:['Falls, because debt is a cheaper source of capital','Stays constant and equal to r_U, the unlevered cost of capital','Rises without bound','Depends only on the corporate tax rate'],
     correct:1, explain:'This is the heart of the "WACC fallacy": more debt lowers the weight on expensive equity, but raises r_E by just enough to leave the weighted average unchanged.'},
    {q:'A firm\'s asset (unlevered) beta primarily reflects:',
     choices:['The risk of its dividend policy','The risk of its underlying operations, independent of how they are financed','The risk of its debt only','The average beta of the stock market'],
     correct:1, explain:'β_U isolates business/operating risk. Relevering (changing D/E) redistributes that fixed risk between debt and equity holders, but doesn\'t change β_U itself.'},
    {q:'Cash and risk-free securities held on a firm\'s balance sheet act like:',
     choices:['Additional debt, raising the risk of the assets','Negative debt, reducing the risk of the assets','Equity, and should be added to E','Nothing — they are irrelevant to risk'],
     correct:1, explain:'Because cash is (near) risk-free, holding it offsets some of the risk from debt. That\'s why leverage and asset beta are usually measured using net debt = debt − cash.'}
  ],
  generators:[
    { name:'MM I: value of levered equity', blurb:'Given an unlevered firm and a levered twin, find E_L.',
      generate: function(){
        const CF = randInt(6,16);
        const rU = randFloat(0.06,0.13,2);
        const Vu = CF/rU;
        const D = Math.round(Vu*randFloat(0.2,0.6,2)*10)/10;
        const rD = randFloat(0.03,0.07,3);
        const EL = Vu - D;
        return {
          prompt:`Firm U is unlevered, with a perpetual pretax cash flow of <b>$${CF} million per year forever</b> (next payment in one year) and an unlevered cost of capital of <b>r_U = ${pct(rU)}</b>. Firm L is identical in every way except that it has issued <b>$${fmt(D,1)} million</b> of perpetual, risk-free debt at <b>r_D = ${pct(rD)}</b>. Capital markets are perfect. According to MM Proposition I, what is the value of Firm L's equity, E_L?`,
          unit:'$ million', answer:EL,
          steps:[
            `Value Firm U as a perpetuity: V_U = CF / r_U = ${CF} / ${rU} = <span class="work">$${fmt(Vu,2)}M</span>.`,
            `MM Proposition I says capital structure can\'t change firm value, so V_L = V_U = <span class="work">$${fmt(Vu,2)}M</span> (the interest rate on debt doesn\'t even enter here — it would only matter for splitting the pie, not its size).`,
            `Equity is what\'s left after debt: E_L = V_L − D = ${fmt(Vu,2)} − ${fmt(D,1)} = <span class="work">$${fmt(EL,2)}M</span>.`
          ],
          final:`E_L = $${fmt(EL,2)} million`
        };
      }
    },
    { name:'MM II: cost of levered equity', blurb:'Use MM Proposition II to find r_E from D/E.',
      generate:function(){
        const rU = randFloat(0.08,0.14,3);
        const rD = randFloat(0.03,Math.max(0.04,rU-0.02),3);
        const DE = randFloat(0.3,2.0,1);
        const rE = rU + DE*(rU-rD);
        return {
          prompt:`A firm operating in perfect capital markets has an unlevered cost of capital of <b>r_U = ${pct(rU)}</b> and a cost of debt of <b>r_D = ${pct(rD)}</b>. It maintains a debt-to-equity ratio of <b>D/E = ${DE}</b>. Using MM Proposition II, what is the firm's cost of equity, r_E?`,
          unit:'%', answer:rE*100,
          steps:[
            `MM Proposition II: r_E = r_U + (D/E)(r_U − r_D).`,
            `r_E = ${pct(rU)} + ${DE} × (${pct(rU)} − ${pct(rD)}) = ${pct(rU)} + ${DE} × ${pct(rU-rD)}.`,
            `r_E = ${pct(rU)} + ${pct(DE*(rU-rD))} = <span class="work">${pct(rE)}</span>.`
          ],
          final:`r_E = ${pct(rE)}`
        };
      }
    },
    { name:'WACC as a weighted average', blurb:'Blend r_E and r_D by market-value weights (no taxes).',
      generate:function(){
        const f = randFloat(0.2,0.7,2);
        const rE = randFloat(0.10,0.19,3);
        const rD = randFloat(0.03,0.07,3);
        const wacc = f*rD + (1-f)*rE;
        return {
          prompt:`A firm has a market-value debt ratio of <b>D/V = ${pct(f)}</b>, a cost of equity of <b>r_E = ${pct(rE)}</b>, and a cost of debt of <b>r_D = ${pct(rD)}</b>. Capital markets are perfect (no taxes). What is the firm's WACC?`,
          unit:'%', answer:wacc*100,
          steps:[
            `WACC is a market-value weighted average: r_wacc = (E/V)r_E + (D/V)r_D.`,
            `E/V = 1 − ${pct(f)} = ${pct(1-f)}.`,
            `r_wacc = ${pct(1-f)} × ${pct(rE)} + ${pct(f)} × ${pct(rD)} = ${pct((1-f)*rE)} + ${pct(f*rD)} = <span class="work">${pct(wacc)}</span>.`
          ],
          final:`r_wacc = ${pct(wacc)} (and in a perfect market this equals r_U)`
        };
      }
    },
    { name:'Unlever & relever an equity beta', blurb:'Strip out financing risk, then re-apply it at a new D/E.',
      generate:function(){
        const betaE = randFloat(0.9,1.9,2);
        const D1 = randInt(20,80);
        const E1 = randInt(80,220);
        const betaU = betaE*E1/(D1+E1);
        const D2 = randInt(20,120);
        const E2 = randInt(60,220);
        const betaE2 = betaU*(D2+E2)/E2;
        return {
          prompt:`A firm currently has equity beta <b>β_E = ${fmt(betaE,2)}</b>, debt of <b>$${D1}M</b> (assume β_D ≈ 0), and equity of <b>$${E1}M</b>. Management is considering recapitalizing to <b>$${D2}M</b> of debt and <b>$${E2}M</b> of equity, with the same total business risk. What would the new equity beta be?`,
          unit:'(beta)', answer:betaE2,
          steps:[
            `First unlever: β_U = β_E × E/(D+E) = ${fmt(betaE,2)} × ${E1}/${D1+E1} = <span class="work">${fmt(betaU,3)}</span>. This is the risk of the operations alone.`,
            `Business risk (β_U) doesn\'t change with the recap — only how it\'s split between debt and equity does.`,
            `Relever at the new mix: β_E' = β_U × (D+E)/E = ${fmt(betaU,3)} × ${D2+E2}/${E2} = <span class="work">${fmt(betaE2,3)}</span>.`
          ],
          final:`New β_E ≈ ${fmt(betaE2,2)}`
        };
      }
    },
    { name:'Net debt & the asset beta', blurb:'Cash is negative debt — unlever using net debt.',
      generate:function(){
        const E = randFloat(60,220,1);
        const betaE = randFloat(0.8,1.7,2);
        const D = randFloat(10,60,1);
        const Cash = randFloat(5,Math.max(8,D-2),1);
        const netDebt = D - Cash;
        const EV = D + E - Cash;
        const betaU = betaE*E/(E+netDebt);
        return {
          prompt:`A company has equity with a market value of <b>$${fmt(E,1)}B</b> and an equity beta of <b>${fmt(betaE,2)}</b>. It has debt of <b>$${fmt(D,1)}B</b> and cash & short-term investments of <b>$${fmt(Cash,1)}B</b>. Treating cash and debt as having zero beta, what is the beta of its underlying business (using net debt)?`,
          unit:'(beta)', answer:betaU,
          steps:[
            `Net debt = Debt − Cash = ${fmt(D,1)} − ${fmt(Cash,1)} = <span class="work">$${fmt(netDebt,1)}B</span>. Enterprise value = D + E − Cash = <span class="work">$${fmt(EV,1)}B</span>.`,
            `Unlever using net debt (cash has β ≈ 0, so it offsets some of the debt\'s effect): β_U = β_E × E / (E + Net Debt).`,
            `β_U = ${fmt(betaE,2)} × ${fmt(E,1)} / (${fmt(E,1)} + ${fmt(netDebt,1)}) = <span class="work">${fmt(betaU,3)}</span>.`
          ],
          final:`β_U ≈ ${fmt(betaU,3)} (Enterprise value = $${fmt(EV,1)}B)`
        };
      }
    }
  ]
},

    {h:'Leveraged recapitalization', p:['A "recap" changes capital structure; a leveraged recap issues debt to repurchase shares. On the announcement, the market immediately capitalizes the expected interest tax shield into the stock price — existing shareholders capture essentially all of that value, even before the buyback happens.']},

{
  id:19, roman:'XIX', title:'Financial Distress, Managerial Incentives, and Information',
  subtitle:'Distress costs, the tradeoff theory, agency conflicts, and signaling — Text Ch. 19',
  concepts:[
    {h:'Financial distress & default', p:['A firm is in financial distress when it has trouble meeting obligations to creditors. Default occurs when a required interest or principal payment is missed; debtholders then gain legal rights over the firm\'s assets via bankruptcy. Equity carries no such risk, since dividends are never a legal obligation.']},
    {h:'Bankruptcy: liquidation vs. reorganization', p:['Liquidation terminates the firm, selling assets and distributing proceeds by priority. Reorganization keeps the firm as a going concern, often replacing old securities with new ones. In Canada, this happens under the Bankruptcy and Insolvency Act (BIA, typically smaller firms) or the CCAA (larger firms).']},
    {h:'Direct vs. indirect costs of distress', p:['Direct costs — legal and administrative fees for lawyers, consultants, appraisers — are typically only 3–4% of pre-distress asset value. Indirect costs (lost customers, lost employees, fire-sale asset prices, distracted management) are much harder to measure but are often far larger.']},
    {h:'Who bears the costs?', p:['In a world with rational, forward-looking investors, the expected costs of financial distress reduce the value of the firm\'s assets today — and because equity is a residual claim, it is shareholders who effectively bear these costs, priced in before the debt is even issued.']},
    {h:'Tradeoff theory', p:['Firms weigh the tax benefit of debt against the expected cost of financial distress: V_L = V_U + PV(interest tax shield) − PV(financial distress costs). At low debt levels the tax shield dominates; as debt rises, distress costs grow and eventually offset it, giving an interior optimum.']},
    {h:'Agency costs: asset substitution', p:['Near financial distress, equity holders can gain by taking on high-risk (even negative-NPV) projects: they get the upside if it pays off, while debtholders absorb the downside if it fails, since equity\'s downside is already floored near zero.']},
    {h:'Agency costs: debt overhang / under-investment', p:['Heavily indebted firms may forgo positive-NPV projects if most of the payoff would go to existing debtholders rather than the equity holders funding the investment — leverage can discourage otherwise value-adding investment.']},
    {h:'Agency benefits of leverage', p:['Leverage can discipline managers: fixed debt payments limit free cash flow available for wasteful spending, and can help owner-managers retain a larger equity stake, sharpening incentives.']},
    {h:'Asymmetric information: signaling', p:['The credibility principle: self-interested claims are only believable if backed by actions that would be too costly if untrue. Taking on debt commits a firm to future payments, credibly signaling management\'s confidence in future cash flows — leverage increases tend to be read as good news.']},
    {h:'Adverse selection & the pecking order', p:['Managers who believe their equity is undervalued avoid issuing new shares (since underpriced sales hurt existing shareholders); only overvalued firms are eager to sell equity, so the market discounts new issues. This leads to the pecking order hypothesis: firms prefer retained earnings first, then debt, and equity only as a last resort.']}
  ],

    {q:'The tradeoff theory says firm value with leverage equals:',

    {q:'"Debt overhang" describes a situation where:',

  generators:[
    { name:'Share price with uncertain (unlevered) payoffs', blurb:'Value an all-equity firm facing two possible future states.',

        const bad = randInt(90,180)*1000;
        const rf = randFloat(0.02,0.06,3);
        const N = randInt(5,15)*1000;

        const price = pv/N;
        return {
          prompt:`A firm's only asset will, in one year, be worth <b>$${fmt(good,0)}</b> ("good" state) or <b>$${fmt(bad,0)}</b> ("bad" state), each with probability 0.5. Assume the asset\'s risk is diversifiable (β = 0), so cash flows can be discounted at the risk-free rate of <b>${pct(rf)}</b>. There are no taxes. The firm is currently all-equity financed with <b>${fmt(N,0)}</b> shares. What is today's share price?`,
          unit:'$ per share', answer:price,
          steps:[
            `Expected payoff in one year = 0.5 × ${fmt(good,0)} + 0.5 × ${fmt(bad,0)} = <span class="work">$${fmt(0.5*(good+bad),0)}</span>.`,
            `Discount at the risk-free rate: PV of assets = ${fmt(0.5*(good+bad),0)} / (1+${rf}) = <span class="work">$${fmt(pv,2)}</span>.`,

        };
      }
    },
    { name:'Splitting value between debt and equity in distress', blurb:'Add a risky debt claim and see who bears the downside.',
      generate:function(){
        const good = randInt(220,320)*1000;
        const bad = randInt(90,170)*1000;
        const rf = randFloat(0.02,0.05,3);
        const F = Math.round((bad + randInt(5,Math.max(6,Math.floor((good-bad)*0.8))))/1000)*1000;
        const debtGood = Math.min(F,good);
        const debtBad = Math.min(F,bad);
        const equityGood = good - debtGood;
        const equityBad = Math.max(bad - F,0);
        const pvEquity = 0.5*(equityGood+equityBad)/(1+rf);
        const pvDebt = 0.5*(debtGood+debtBad)/(1+rf);
        return {
          prompt:`Same firm: assets will be worth <b>$${fmt(good,0)}</b> (good) or <b>$${fmt(bad,0)}</b> (bad) in one year, each with probability 0.5; r_f = <b>${pct(rf)}</b>; no taxes. Suppose the firm instead borrows, promising to repay a <b>face value of $${fmt(F,0)}</b> in one year (proceeds used to repurchase shares). What is the present value of equity now?`,
          unit:'$', answer:pvEquity,
          steps:[
            `Debt is risky here because ${fmt(bad,0)} < ${fmt(F,0)}: in the bad state, debtholders can only be paid what\'s available. Debt payoff: good = min(F, ${fmt(good,0)}) = <span class="work">${fmt(debtGood,0)}</span>; bad = min(F, ${fmt(bad,0)}) = <span class="work">${fmt(debtBad,0)}</span>.`,
            `Equity is the residual claim: good = ${fmt(good,0)} − ${fmt(debtGood,0)} = <span class="work">${fmt(equityGood,0)}</span>; bad = max(${fmt(bad,0)} − ${fmt(F,0)}, 0) = <span class="work">${fmt(equityBad,0)}</span>.`,
            `PV(equity) = 0.5 × (${fmt(equityGood,0)} + ${fmt(equityBad,0)}) / (1+${rf}) = <span class="work">$${fmt(pvEquity,2)}</span>. (For reference, PV(debt) ≈ $${fmt(pvDebt,2)}, and PV(equity)+PV(debt) should equal the unlevered asset value.)`
          ],
          final:`PV(equity) ≈ $${fmt(pvEquity,2)}`
        };

  concepts:[
    {h:'Three approaches, one answer', p:['When financing matters, project valuation needs to account for leverage. Three methods — WACC, adjusted present value (APV), and flow-to-equity (FTE) — should, if applied consistently, give the same answer. The right one to use depends on the firm\'s leverage policy.']},
    {h:'WACC', p:['Discount unlevered free cash flow (FCF) at r_wacc, which already embeds the interest tax shield inside the discount rate. Best when the firm maintains a fixed, constant debt-to-value (or debt-to-equity) ratio, so r_wacc stays stable over time.',
      'FCF = EBIT(1−τ_c) + Depreciation − CapEx − ΔNWC. V_L = PV(FCF at r_wacc); NPV = V_L − Investment cost.']},
    {h:'Adjusted Present Value (APV)', p:['V_L = V_U + PV(interest tax shield), calculated as two separate pieces. First value the project as if all-equity financed (discount FCF at r_U), then separately add the value of the tax shield.',
      'Best when debt follows a predetermined schedule, or a target interest-coverage ratio — cases where WACC is awkward because leverage (and hence r_wacc) shifts over time. It is more complex than WACC when leverage is a constant ratio, since you may need to know debt capacity at each point in time.']},
    {h:'Flow-to-Equity (FTE)', p:['Focuses directly on cash flows to shareholders: FCFE_t = FCF_t − D_{t-1}·r_D·(1−τ_c) + (D_t − D_{t-1}), discounted at r_E. NPV = PV(FCFE) and then V_L = NPV + Investment cost.',
      'FTE is well-suited to a constant D/E policy, and especially useful when equity value must be found directly for a complex capital structure containing securities with unknown market values.']},
    {h:'Discount rate for the tax shield depends on the leverage policy', p:['Constant D/V (or D/E): the tax shield is proportional to firm value/FCF risk, so discount at r_U.',
      'Target interest coverage ratio k (interest = k × FCF): shield is proportional to FCF, so also discount at r_U — giving the clean result V_L = V_U × (1 + τ_c·k).',
      'Predetermined (fixed dollar) debt levels: the shield is nearly as safe as the debt payments themselves, so discount at r_D. For permanent fixed debt D, PV(ITS) = τ_c·D.']},
    {h:'Financial distress and agency costs in valuation', p:['Leverage-related distress and agency costs should be built directly into projected FCF (they typically lower expected FCF) and can raise r_U itself (systematic risk of cash flows tends to rise when distress is more likely in downturns). Note: r_U excludes the tax shield but is not immune to distress and agency costs.']}

  id:'MT2', roman:'Tutorial', chipLabel:'★', title:'Midterm 2 Tutorial: Comprehensive Problems',

  concepts:[
    {h:'Ex-dividend arbitrage and tax clienteles', p:['If the actual ex-dividend price drop is smaller than an investor\'s indifference drop, that investor can profit by buying just before the stock goes ex-dividend, collecting the dividend, and selling just after — provided their personal dividend tax rate is low enough.',
      'Solving −ΔP + Div(1−τ_d) + ΔP·τ_g > 0 for τ_d gives the highest dividend tax rate at which the trade is still profitable: τ_d < 1 − ΔP(1−τ_g)/Div. Investors with tax rates below this threshold have an incentive to trade around the dividend; this is one driver of the clientele effect.']},
    {h:'Homemade dividends with a real timeline', p:['MM Dividend Irrelevance holds even when a firm changes its payout schedule mid-life. If a firm raises a dividend at one date by issuing new equity, the new shareholders must be promised enough at the next date to earn their required return — which reduces what\'s left for the original shareholders later. Work date-by-date: figure out how much extra cash is needed today, what return new investors demand, and what is left over for existing holders down the line.',
      'Equivalently, any shareholder can replicate a different dividend policy on their own — by selling extra shares to raise cash early, or reinvesting an unwanted dividend — landing at the identical final wealth either way.']},
    {h:'Reconciling WACC and FTE with a changing debt level', p:['When a firm targets a constant D/V ratio, its dollar amount of debt still changes year to year as the project\'s value changes — this is its "debt capacity." Debt capacity at time t equals (D/V) × the project\'s continuation value at time t (i.e., the value of its remaining future cash flows discounted at r_wacc). At the very end of a project\'s life, debt capacity is zero.',
      'Flow-to-equity cash flow each year is FCFE_t = FCF_t − D_{t-1}r_D(1−τ_c) + (D_t − D_{t-1}): free cash flow, minus after-tax interest on last year\'s debt, plus this year\'s net new borrowing (which is negative when debt is being paid down). Discounting FCFE at r_E gives exactly the same NPV as discounting FCF at r_wacc — a useful check on your work.']},
    {h:'Valuing debt directly from its promised cash flows', p:['When the market value of a firm\'s debt isn\'t quoted directly, you can compute it like any bond: discount the promised coupons and principal at the appropriate market rate. For risk-free debt, that rate is the risk-free rate. Enterprise value is then market value of equity plus this computed market value of debt, and you can back out an unknown like r_wacc = FCF/EV for a level perpetuity, or solve the WACC equation for whichever variable (often r_E) isn\'t directly observable.']},
    {h:'Subsidized financing and APV', p:['A below-market interest rate is a second source of value alongside the ordinary interest tax shield. The value of the subsidy equals the loan\'s face value minus the present value of its actual promised payments discounted at the market rate the firm would otherwise have paid.',
      'Full APV with a subsidized loan: NPV = NPV(unlevered) + PV(interest tax shield) + Value of the rate subsidy. It\'s often revealing to also compute what the NPV would have been with ordinary market-rate debt (tax shield only, no subsidy) — sometimes a subsidy is what turns an otherwise value-destroying project into one worth taking.']}

  generators:[
    { name:'Ex-dividend date: breakeven tax rate', blurb:'Find the highest dividend tax rate at which capturing a dividend is still profitable.',
      generate:function(){
        const Div = randFloat(0.5,4,2);
        const dP = randFloat(Div*0.55,Div*0.92,2);
        const Tg = randFloat(0.15,0.28,2);
        const TdMax = 1 - dP*(1-Tg)/Div;
        return {
          prompt:`A stock pays a regular dividend of <b>$${fmt(Div,2)}</b> per share, and its price typically drops by <b>$${fmt(dP,2)}</b> per share when it goes ex-dividend. The capital gains tax rate is <b>τ_g = ${pct(Tg)}</b>, and there are no transaction costs. What is the highest personal dividend tax rate τ_d at which an investor could still profit from buying the stock just before it goes ex-dividend, collecting the dividend, and selling immediately after?`,
          unit:'%', answer:TdMax*100,
          steps:[
            `The after-tax cash flow from buying cum-dividend at P_cum, collecting Div, and selling ex-dividend at P_ex is: −P_cum + P_ex + Div(1−τ_d) + (P_cum−P_ex)·τ_g = −ΔP + Div(1−τ_d) + ΔP·τ_g, where ΔP = P_cum − P_ex = $${fmt(dP,2)}.`,
            `Set this expression greater than zero and solve for τ_d: Div(1−τ_d) > ΔP(1−τ_g)  ⟹  1−τ_d > ΔP(1−τ_g)/Div  ⟹  τ_d < 1 − ΔP(1−τ_g)/Div.`,
            `τ_d < 1 − [${fmt(dP,2)} × (1−${fmt(Tg,2)})] / ${fmt(Div,2)} = 1 − [${fmt(dP,2)} × ${fmt(1-Tg,2)}]/${fmt(Div,2)} = 1 − ${fmt(dP*(1-Tg)/Div,4)} = <span class="work">${pct(TdMax,2)}</span>.`
          ],
          final:`τ_d,max ≈ ${pct(TdMax,2)} — investors taxed below this rate can profit from the trade`

      }
    },
    { name:'Homemade dividends: financing a policy change', blurb:'A liquidating firm changes its dividend schedule to satisfy one shareholder\'s timing preference.',
      generate:function(){
        const N0 = randInt(15,30)*100000;
        const E1 = randInt(15,30)*1000000;
        const Capex1 = randInt(4,Math.floor(E1/1000000*0.5))*1000000;
        const E2 = randInt(18,34)*1000000;
        const r = randFloat(0.15,0.25,2);
        const f = randFloat(0.15,0.35,2);
        const div1BaseTotal = E1-Capex1;
        const div1PerShare = div1BaseTotal/N0;
        const investorShares = Math.round(f*N0);
        const baseIncome1 = div1PerShare*investorShares;
        const extraDesired = randInt(3,18)*100000;
        const desired1 = baseIncome1+extraDesired;
        const dPerShare = extraDesired/investorShares;
        const extraCash = dPerShare*N0;
        const x = (E2-extraCash*(1+r))/N0;
        const P1 = x/(1+r);
        const newShares = extraCash/P1;
        return {
          prompt:`A firm has <b>${fmt(N0,0)}</b> shares outstanding. It is all-equity, will be liquidated in 2 years, and its policy is to pay out all surplus cash as dividends. Earnings will be <b>$${fmt(E1,0)}</b> at the end of year 1 (after a planned <b>$${fmt(Capex1,0)}</b> investment outlay that year) and <b>$${fmt(E2,0)}</b> at the end of year 2 (liquidation). The required return is <b>${pct(r)}</b>. You own <b>${pct(f)}</b> of the firm and want to receive <b>$${fmt(desired1,0)}</b> in total at the end of year 1 — more than your share of the current policy provides. The firm agrees to raise its year-1 dividend for <i>all</i> shareholders and finance the difference by issuing new shares at the fair ex-dividend price. How many new shares must the firm issue?`,
          unit:'shares', answer:newShares,
          steps:[
            `Current (base) policy: year-1 dividend = E₁ − CapEx₁ = ${fmt(E1,0)} − ${fmt(Capex1,0)} = <span class="work">$${fmt(div1BaseTotal,0)}</span>, or $${fmt(div1PerShare,2)} per share. Your ${pct(f)} stake is ${fmt(investorShares,0)} shares, so your base year-1 income = $${fmt(div1PerShare,2)} × ${fmt(investorShares,0)} = <span class="work">$${fmt(baseIncome1,0)}</span>.`,
            `You want an extra $${fmt(extraDesired,0)} (to reach $${fmt(desired1,0)}). Since any dividend increase applies per-share to everyone, the extra dividend per share needed is $${fmt(extraDesired,0)} / ${fmt(investorShares,0)} = <span class="work">$${fmt(dPerShare,2)}</span>, so total new cash to raise = $${fmt(dPerShare,2)} × ${fmt(N0,0)} = <span class="work">$${fmt(extraCash,0)}</span>.`,
            `New shareholders need to earn ${pct(r)}, so they must receive $${fmt(extraCash,0)} × (1+${r}) = <span class="work">$${fmt(extraCash*(1+r),0)}</span> at year 2. The rest of E₂ funds the year-2 dividend per share for everyone still holding: per-share year-2 dividend = [E₂ − ${fmt(extraCash*(1+r),0)}] / N₀ = [${fmt(E2,0)} − ${fmt(extraCash*(1+r),0)}] / ${fmt(N0,0)} = <span class="work">$${fmt(x,3)}</span>.`,
            `The ex-dividend share price right after the year-1 dividend (but before the new issue) is the PV of that year-2 dividend: P₁ = $${fmt(x,3)} / (1+${r}) = <span class="work">$${fmt(P1,3)}</span>.`,
            `New shares issued = Cash needed / P₁ = ${fmt(extraCash,0)} / ${fmt(P1,3)} = <span class="work">${fmt(newShares,0)} shares</span>.`
          ],
          final:`New shares to issue ≈ ${fmt(newShares,0)}`
        };
      }
    },
    { name:'Reconciling WACC and FTE over a multi-year project', blurb:'Track a shrinking debt schedule and confirm both methods agree.',
      generate:function(){
        const MVeq = randFloat(6,14,1)*1e9;
        const D = MVeq*randFloat(0.25,0.5,2);
        const EV = MVeq+D;
        const rE = randFloat(0.08,0.13,3);
        const rD = randFloat(0.04,0.08,3);
        const tc = randFloat(0.25,0.40,2);
        const FCF0 = -randInt(70,140);
        const FCF1 = randInt(35,70);
        const FCF2 = randInt(70,130);
        const FCF3 = randInt(50,100);
        const f = D/EV;
        const rwacc = (MVeq/EV)*rE + f*rD*(1-tc);
        const pv1=FCF1/(1+rwacc), pv2=FCF2/Math.pow(1+rwacc,2), pv3=FCF3/Math.pow(1+rwacc,3);
        const V0 = pv1+pv2+pv3;
        const npvWacc = V0+FCF0;
        const D0 = f*V0;
        const CV2 = FCF3/(1+rwacc);
        const D2 = f*CV2;
        const CV1 = FCF2/(1+rwacc)+FCF3/Math.pow(1+rwacc,2);
        const D1 = f*CV1;
        const D3 = 0;
        const FCFE0 = FCF0 + D0;
        const FCFE1 = FCF1 - D0*rD*(1-tc) + (D1-D0);
        const FCFE2 = FCF2 - D1*rD*(1-tc) + (D2-D1);
        const FCFE3 = FCF3 - D2*rD*(1-tc) + (D3-D2);
        const npvFTE = FCFE0 + FCFE1/(1+rE) + FCFE2/Math.pow(1+rE,2) + FCFE3/Math.pow(1+rE,3);
        return {
          prompt:`A firm has an equity cost of capital of <b>${pct(rE)}</b>, market capitalization of <b>$${fmt(MVeq/1e9,2)}B</b>, and enterprise value of <b>$${fmt(EV/1e9,2)}B</b>. Its debt cost of capital is <b>${pct(rD)}</b> and its marginal tax rate is <b>${pct(tc)}</b>. It maintains a constant debt-to-value ratio. A new 3-year project has free cash flows (in $ millions) of <b>${FCF0}</b> today, then <b>${FCF1}</b>, <b>${FCF2}</b>, and <b>${FCF3}</b> in years 1–3. What is this project's NPV, computed using the flow-to-equity (FTE) method? (It should match the WACC method.)`,
          unit:'$ million', answer:npvFTE,
          steps:[
            `Debt/value ratio: D/EV = (${fmt(EV/1e9,2)} − ${fmt(MVeq/1e9,2)}) / ${fmt(EV/1e9,2)} = <span class="work">${pct(f)}</span>. WACC = (E/V)r_E + (D/V)r_D(1−τ_c) = <span class="work">${pct(rwacc)}</span>.`,
            `WACC method: V₀ = ${FCF1}/(1+${fmt(rwacc,4)}) + ${FCF2}/(1+${fmt(rwacc,4)})² + ${FCF3}/(1+${fmt(rwacc,4)})³ = <span class="work">$${fmt(V0,2)}M</span>; NPV = V₀ + FCF₀ = ${fmt(V0,2)} + (${FCF0}) = <span class="work">$${fmt(npvWacc,2)}M</span>.`,
            `Debt capacity (D/V × continuation value each year): D₀ = ${pct(f)}×${fmt(V0,2)} = <span class="work">$${fmt(D0,2)}M</span>; D₁ = ${pct(f)}×${fmt(CV1,2)} = <span class="work">$${fmt(D1,2)}M</span>; D₂ = ${pct(f)}×${fmt(CV2,2)} = <span class="work">$${fmt(D2,2)}M</span>; D₃ = 0 (project ends).`,
            `FCFE₀ = FCF₀ + D₀ = ${FCF0} + ${fmt(D0,2)} = <span class="work">$${fmt(FCFE0,2)}M</span>.`,
            `FCFE₁ = FCF₁ − D₀r_D(1−τ_c) + (D₁−D₀) = ${FCF1} − ${fmt(D0*rD*(1-tc),2)} + (${fmt(D1-D0,2)}) = <span class="work">$${fmt(FCFE1,2)}M</span>.`,
            `FCFE₂ = FCF₂ − D₁r_D(1−τ_c) + (D₂−D₁) = ${FCF2} − ${fmt(D1*rD*(1-tc),2)} + (${fmt(D2-D1,2)}) = <span class="work">$${fmt(FCFE2,2)}M</span>.`,
            `FCFE₃ = FCF₃ − D₂r_D(1−τ_c) + (D₃−D₂) = ${FCF3} − ${fmt(D2*rD*(1-tc),2)} + (${fmt(D3-D2,2)}) = <span class="work">$${fmt(FCFE3,2)}M</span>.`,
            `Discount FCFE at r_E: NPV = ${fmt(FCFE0,2)} + ${fmt(FCFE1,2)}/(1+${rE}) + ${fmt(FCFE2,2)}/(1+${rE})² + ${fmt(FCFE3,2)}/(1+${rE})³ = <span class="work">$${fmt(npvFTE,2)}M</span> — matching the WACC-method NPV of $${fmt(npvWacc,2)}M above (small gaps are just rounding).`
          ],
          final:`NPV (FTE) ≈ $${fmt(npvFTE,2)} million`
        };
      }
    },
    { name:'Comprehensive: value debt, then back out r_E', blurb:'Compute WACC from EV and FCF, then solve the WACC equation for the unknown r_E.',
      generate:function(){
        const N = randInt(6,14)*1000000;
        const P0 = randFloat(20,55,2);
        const couponRate = randFloat(0.06,0.11,3);
        const Face = randInt(60,140)*1000000;
        const n = randInt(3,6);
        const rf = randFloat(0.04,0.07,3);
        const EBIT = randInt(70,160)*1000000;
        const tc = randFloat(0.25,0.40,2);
        const depCapex = randInt(8,25)*1000000;
        const MVeq = N*P0;
        const coupon = couponRate*Face;
        const annuityFactor = (1-Math.pow(1+rf,-n))/rf;
        const MVdebt = coupon*annuityFactor + Face/Math.pow(1+rf,n);
        const EV = MVeq+MVdebt;
        const FCF = EBIT*(1-tc); // dep - capex cancels, dNWC = 0
        const rwacc = FCF/EV;
        const DVratio = MVdebt/EV, EVratio = MVeq/EV;
        const rE = (rwacc - DVratio*rf*(1-tc)) / EVratio;
        return {
          prompt:`A firm has <b>${fmt(N,0)}</b> shares outstanding trading at <b>$${fmt(P0,2)}</b> per share. It also has long-term, risk-free debt: <b>${n} years</b> to maturity, annual coupons at a rate of <b>${pct(couponRate)}</b>, and a face value of <b>$${fmt(Face,0)}</b> (first coupon due in exactly one year). The risk-free rate for all maturities is <b>${pct(rf)}</b>. EBIT of <b>$${fmt(EBIT,0)}</b> is expected to continue forever; capital expenditures are expected to equal depreciation each year at <b>$${fmt(depCapex,0)}</b>, and net working capital is not expected to change. The corporate tax rate is <b>${pct(tc)}</b>, and the firm plans to maintain its current debt-to-value ratio forever. What is the firm's cost of equity, r_E?`,
          unit:'%', answer:rE*100,
          steps:[
            `Market value of equity = N × P₀ = ${fmt(N,0)} × ${fmt(P0,2)} = <span class="work">$${fmt(MVeq,0)}</span>.`,
            `Value the debt like a bond: annual coupon = ${pct(couponRate)} × ${fmt(Face,0)} = $${fmt(coupon,0)}. MV(debt) = Coupon×[1−(1+r_f)⁻ⁿ]/r_f + Face/(1+r_f)ⁿ = ${fmt(coupon,0)}×${fmt(annuityFactor,4)} + ${fmt(Face,0)}/(1+${rf})^${n} = <span class="work">$${fmt(MVdebt,0)}</span>.`,
            `Enterprise value = MV(equity) + MV(debt) = ${fmt(MVeq,0)} + ${fmt(MVdebt,0)} = <span class="work">$${fmt(EV,0)}</span>.`,
            `Free cash flow = EBIT(1−τ_c) + Dep − CapEx − ΔNWC = ${fmt(EBIT,0)}×${fmt(1-tc,2)} + 0 − 0 = <span class="work">$${fmt(FCF,0)}</span> (depreciation and CapEx are equal, so they cancel).`,
            `Since FCF is a level perpetuity equal to EV, r_wacc = FCF / EV = ${fmt(FCF,0)} / ${fmt(EV,0)} = <span class="work">${pct(rwacc,4)}</span>.`,
            `Now solve the WACC identity for r_E: r_wacc = (E/V)r_E + (D/V)r_D(1−τ_c), with D/V = ${fmt(DVratio,4)} and E/V = ${fmt(EVratio,4)}. r_E = [r_wacc − (D/V)r_D(1−τ_c)] / (E/V) = [${fmt(rwacc,4)} − ${fmt(DVratio*rf*(1-tc),4)}] / ${fmt(EVratio,4)} = <span class="work">${pct(rE,4)}</span>.`
          ],
          final:`r_E ≈ ${pct(rE,2)}`
        };
      }
    },
    { name:'Subsidized loan: full APV', blurb:'Split the value of below-market financing into a tax shield and a rate subsidy.',
      generate:function(){
        const L = randInt(5,15)*1000000;
        const rs = randFloat(0.02,0.06,3);
        const rm = randFloat(0.09,0.15,3);
        const n = randInt(3,6);
        const tc = randFloat(0.25,0.40,2);
        const rU = randFloat(0.13,0.20,3);
        const FCF = randInt(3,8)*1000000;
        const Cost = randInt(10,20)*1000000;
        const annuity = (r,nn)=> (1-Math.pow(1+r,-nn))/r;
        const pvU = FCF*annuity(rU,n);
        const npvU = pvU-Cost;
        const pvLoanMarket = L/Math.pow(1+rm,n) + rs*L*(1-tc)*annuity(rm,n);
        const subsidy = L-pvLoanMarket;
        const npvWithSub = npvU+subsidy;
        const pvits = L*tc*(1-Math.pow(1+rm,-n));
        const npvNoSub = npvU+pvits;
        return {
          prompt:`A government agency offers to lend a firm <b>$${fmt(L,0)}</b> for <b>${n} years</b> at a fixed annual rate of <b>${pct(rs)}</b> (interest paid annually, principal repaid at maturity). The market rate on a comparable loan would be <b>${pct(rm)}</b>. The loan will fund a project costing <b>$${fmt(Cost,0)}</b> that generates free cash flow of <b>$${fmt(FCF,0)}</b> per year for ${n} years. The corporate tax rate is <b>${pct(tc)}</b>, and the firm's unlevered cost of capital is <b>${pct(rU)}</b>. What is the project's NPV, accounting for the subsidized loan?`,
          unit:'$', answer:npvWithSub,
          steps:[
            `Unlevered NPV first: PV = ${fmt(FCF,0)} × [1−(1+${rU})⁻${n}]/${rU} = <span class="work">$${fmt(pvU,0)}</span>; NPV_U = ${fmt(pvU,0)} − ${fmt(Cost,0)} = <span class="work">$${fmt(npvU,0)}</span>.`,
            `Value the loan's actual promised payments (interest at ${pct(rs)}, after-tax, plus principal) at the market rate ${pct(rm)}: PV = ${fmt(L,0)}/(1+${rm})^${n} + ${fmt(rs,3)}×${fmt(L,0)}×(1−${tc})×[1−(1+${rm})⁻${n}]/${rm} = <span class="work">$${fmt(pvLoanMarket,0)}</span>.`,
            `Value of the subsidy = Face value − PV(actual payments at market rate) = ${fmt(L,0)} − ${fmt(pvLoanMarket,0)} = <span class="work">$${fmt(subsidy,0)}</span>. This captures the benefit of paying below-market interest.`,
            `Total project NPV = NPV_U + Subsidy value = ${fmt(npvU,0)} + ${fmt(subsidy,0)} = <span class="work">$${fmt(npvWithSub,0)}</span>.`,
            `(For comparison, with an ordinary market-rate loan there\'d be no subsidy — only the usual interest tax shield, PV(ITS) = ${fmt(L,0)}×${pct(tc)}×[1−(1+${rm})⁻${n}] = $${fmt(pvits,0)}, giving NPV = ${fmt(npvU,0)} + ${fmt(pvits,0)} = $${fmt(npvNoSub,0)}${npvNoSub<0?' — in that case the firm would not take the project at all.':' .'})`
          ],
          final:`NPV with the subsidized loan ≈ $${fmt(npvWithSub,0)}`
        };
      }
    }
  ]
},

    {h:'Initial Public Offerings (IPOs)', p:['Going public increases liquidity and access to larger pools of capital, but brings costs: wider ownership makes monitoring management harder (agency costs), and there is costly regulatory compliance (e.g., with the OSC or SEC).',
      'In a primary offering, new shares raise fresh capital for the firm; in a secondary offering, existing shares are sold by current holders.']},
    {h:'Underwriting types', p:['Smaller IPOs are often sold on a best-efforts basis (no guarantee of success). Larger IPOs typically use firm commitment underwriting, where the underwriter buys the whole issue at a discount and resells it, bearing the risk of an unsold or underpriced issue. Auction IPOs let investors submit bids; all winning bidders pay the same market-clearing price.']},
    {h:'The IPO process', p:['A preliminary prospectus ("red herring") is filed with regulators; a "road show" gauges investor demand ("book building"); the final offer price and prospectus follow. Post-IPO, pre-existing shareholders are typically subject to a lockup period (often 180 days) before they can sell.']},
    {h:'Managing underwriting risk: the greenshoe', p:['An over-allotment allocation ("greenshoe option") lets underwriters sell up to 15% more shares than planned, effectively selling short; if the price rises, they exercise the option to cover; if it falls, they buy back shares in the market at the lower price to cover and stabilize the price.']},
    {h:'IPO underpricing', p:['IPOs are, on average, priced below the price at which the market subsequently trades them (about 6% underpricing in Canada, 18% in the U.S., varying by country and era). Possible explanations: underwriters minimize the risk of a withdrawn issue and legal liability, influential investors extract discounts, and the "winner\'s curse" among less-informed bidders.']},
    {h:'Seasoned Equity Offerings (SEOs)', p:['A publicly traded firm sells additional new shares. A cash offer sells to any investor; a rights offer first offers new shares to existing shareholders (common in the U.K., rarer in North America), protecting them from dilution at an unfavorable price.',
      'On average, announcing an SEO causes the stock price to fall roughly 3% — consistent with adverse selection concerns (why would a well-informed manager sell equity if it weren\'t at least fully, or over-, valued?).']},
    {h:'Flotation costs', p:['Direct costs (underwriting spread, legal/accounting/filing fees) are disclosed in the prospectus; indirect costs (management time, underpricing, the SEO announcement price drop) are not, but are real economic costs of raising equity.']}
  ],
  formulas:[
    {n:'Pre-money valuation', e:'Pre-money = Existing shares × New issue price'},
    {n:'Post-money valuation', e:'Post-money = (Existing + New shares) × New issue price'},
    {n:'Rights needed per new share', e:'N (existing) / New shares to be issued'},
    {n:'Value of a right', e:'(P_cum − P_subscription) / (Rights per share + 1)'},
    {n:'Ex-rights price', e:'(N·P + Amount raised) / (N + New shares)'}
  ],
  mcq:[
    {q:'Venture capital (VC) firms typically:',
     choices:['Invest primarily in mature, publicly traded companies','Are limited partnerships that raise funds to invest in young private firms, often taking board seats','Only make loans, never take equity positions','Are prohibited from investing in the same industry twice'],
     correct:1, explain:'VC firms are run by general partners (venture capitalists) on behalf of limited partners, focusing on young private companies and often becoming actively involved via board seats.'},
    {q:'The "pre-money valuation" of a firm in a new financing round equals:',
     choices:['(Existing + new shares) × new issue price','Existing shares × new issue price','New shares × new issue price only','Total assets minus total liabilities'],
     correct:1, explain:'Pre-money values the firm\'s existing ownership at the price being paid by new investors; add the new capital raised (new shares × price) to get post-money valuation.'},
    {q:'In a firm-commitment underwritten IPO, the underwriter:',
     choices:['Simply tries to sell shares with no guarantee of success','Guarantees the sale of the entire issue by buying it from the firm at a discount and reselling it','Only sells to institutional investors','Is not compensated for the offering'],
     correct:1, explain:'Firm commitment underwriting shifts the risk of an unsold or underpriced issue onto the underwriter, who buys the whole offering upfront at a discount to the public offer price.'},
    {q:'"IPO underpricing" refers to the well-documented tendency for:',
     choices:['IPO shares to be priced above their true value','An IPO\'s first-day closing price to often end up notably above the offer price','SEOs to be underpriced more than IPOs','Underwriters to lose money on almost every IPO'],
     correct:1, explain:'On average, IPO shares jump in price on the first trading day, meaning the offer price was set below where the market was willing to trade the stock.'},
    {q:'On average, when a publicly traded firm announces a seasoned equity offering (SEO), its stock price tends to:',
     choices:['Rise, reflecting new investment opportunities','Fall by roughly 3%, often attributed to adverse selection','Stay essentially unchanged','Rise sharply due to the extra capital raised'],
     correct:1, explain:'Investors often interpret a new equity sale as a signal that managers believe the stock is fully or over-valued, which is consistent with the observed price decline.'},
    {q:'A rights offering primarily gives existing shareholders:',
     choices:['An obligation to buy new shares at a premium price','The option to buy new shares at a set subscription price, protecting their proportional ownership','A guaranteed cash dividend','Extra voting rights only'],
     correct:1, explain:'Rights offers let existing shareholders maintain their percentage ownership by buying new shares at the subscription price (or selling the rights to someone who will).'}
  ],
  generators:[
    { name:'Pre-money & post-money valuation', blurb:'Value a private firm around a new financing round.',
      generate:function(){
        const existing = randFloat(5,20,2);
        const price = randFloat(0.5,5,2);
        const newSh = randFloat(1,5,2);
        const preMoney = existing*price;
        const postMoney = (existing+newSh)*price;
        return {
          prompt:`A private firm has <b>${fmt(existing,2)} million</b> shares outstanding. In a new financing round, it sells <b>${fmt(newSh,2)} million</b> new shares to investors at <b>$${fmt(price,2)}</b> per share. What is the firm's pre-money valuation?`,
          unit:'$ million', answer:preMoney,
          steps:[
            `Pre-money valuation = existing shares × new issue price = ${fmt(existing,2)}M × ${fmt(price,2)} = <span class="work">$${fmt(preMoney,2)}M</span>.`,
            `(For reference, post-money valuation = (existing + new shares) × price = ${fmt(existing+newSh,2)}M × ${fmt(price,2)} = $${fmt(postMoney,2)}M — the difference is exactly the ${fmt(newSh*price,2)}M raised in the round.)`
          ],
          final:`Pre-money valuation = $${fmt(preMoney,2)} million`
        };
      }
    },
    { name:'Rights offering: value of a right', blurb:'Work through a seasoned equity rights issue.',
      generate:function(){
        const N = randFloat(5,20,1);
        const P = randFloat(10,30,2);
        const M = randFloat(20,100,1);
        const Ps = randFloat(P*0.5,P*0.85,2);
        const newShares = M/Ps;
        const rightsPerShare = N/newShares;
        const rightValue = (P-Ps)/(rightsPerShare+1);
        const exRightsPrice = (N*P+M)/(N+newShares);
        return {
          prompt:`A firm has <b>${fmt(N,1)} million</b> shares outstanding, currently trading at <b>$${fmt(P,2)}</b>. It wants to raise <b>$${fmt(M,1)} million</b> through a rights offering with a subscription price of <b>$${fmt(Ps,2)}</b> per share. Assuming ${fmt(rightsPerShare,2)} rights are required to buy one new share, what is the approximate value of a single right?`,
          unit:'$ per right', answer:rightValue,
          steps:[
            `New shares to be issued = Amount to raise / Subscription price = ${fmt(M,1)}M / ${fmt(Ps,2)} = <span class="work">${fmt(newShares,3)}M shares</span>.`,
            `Rights needed per new share = existing shares / new shares = ${fmt(N,1)} / ${fmt(newShares,3)} = <span class="work">${fmt(rightsPerShare,3)}</span>.`,
            `Value of a right ≈ (P_cum − P_subscription) / (rights per share + 1) = (${fmt(P,2)} − ${fmt(Ps,2)}) / (${fmt(rightsPerShare,3)} + 1) = <span class="work">$${fmt(rightValue,4)}</span>.`
          ],
          final:`Value of a right ≈ $${fmt(rightValue,3)} (ex-rights price ≈ $${fmt(exRightsPrice,2)})`
        };
      }
    }
  ]
}
];

/* =========================================================
   STATE
   ========================================================= */
const state = {
  view:'home',        // 'home' | 'chapter'
  chapterId:null,
  tab:'concepts',      // 'concepts' | 'practice' | 'quiz'
  activeGenIdx:null,
  currentProblem:null,
  quiz:{pool:[],idx:0,score:0,answered:false},
};

function getChapter(id){ return CHAPTERS.find(c=>c.id==id); }

/* =========================================================
   RENDER: SIDEBAR
   ========================================================= */
function renderSidebar(){
  const el = document.getElementById('sidebar');
  let html = `
    <div class="brand">
      <div class="mark">AFM 274 · Corporate Finance</div>
      <h1>Ledger</h1>
      <p>A study studio for capital structure, payout &amp; valuation</p>
    </div>
    <div class="nav-item ${state.view==='home'?'active':''}" onclick="goHome()">
      <div class="chip">◆</div>
      <div class="lbl">Overview<small>Course map</small></div>
    </div>
    <div class="nav-group-label">Chapters</div>
  `;
  CHAPTERS.forEach(c=>{
    const active = state.view==='chapter' && state.chapterId==c.id;
    html += `
      <div class="nav-item ${active?'active':''}" onclick="openChapter('${c.id}')">
        <div class="chip">${c.chipLabel||c.id}</div>
        <div class="lbl">${shortTitle(c.title)}<small>${c.subtitle.split('—')[0].trim()}</small></div>
      </div>
    `;
  });
  html += `
    <div class="side-foot">Built from your AFM 274 course decks (Ch. 17–21, 23) and the Midterm 2 review. Practice numbers are randomized — hit "New numbers" for endless reps.</div>
  `;
  el.innerHTML = html;
}
function shortTitle(t){
  return t.length>26 ? t.slice(0,24)+'…' : t;
}

/* =========================================================
   RENDER: HOME
   ========================================================= */
function renderHome(){
  const main = document.getElementById('main');
  let cards = CHAPTERS.map(c=>`
    <div class="home-card" onclick="openChapter('${c.id}')">
      <div class="chip">${c.id}</div>
      <h4>${c.title}</h4>
      <p>${c.subtitle}</p>
    </div>
  `).join('');
  main.innerHTML = `
    <div class="home-hero">
      <div class="eyebrow">Study Studio</div>
      <h2>Learn it, then prove it.</h2>
      <p>Each chapter pairs a tight set of concept notes and formulas with practice problems built from your course's own examples — regenerated with new numbers every time, plus concept quizzes for the qualitative material. Pick a chapter to start, or jump into a mixed review pulling from everything.</p>
      <div class="mix-btn" onclick="startMixedPractice()">⟲ Mixed practice — pull a random problem from any chapter</div>
    </div>
    <div class="home-grid">${cards}</div>
  `;
}

/* =========================================================
   RENDER: CHAPTER
   ========================================================= */
function openChapter(id){
  state.view='chapter';
  state.chapterId=id;
  state.tab='concepts';
  state.activeGenIdx=null;
  state.currentProblem=null;
  render();
}
function goHome(){
  state.view='home';
  render();
}
function setTab(tab){
  state.tab=tab;
  state.activeGenIdx=null;
  state.currentProblem=null;
  if(tab==='quiz') startQuiz(state.chapterId);
  render();
}

function renderChapter(){
  const main = document.getElementById('main');
  const c = getChapter(state.chapterId);
  main.innerHTML = `
    <div class="crumbs">Chapter ${c.roman} · Text Ch. ${c.id}</div>
    <div class="page-head">
      <h2>${c.title}</h2>
      <p class="dek">${c.subtitle}</p>
    </div>
    <div class="tabbar">
      <button class="tabbtn ${state.tab==='concepts'?'active':''}" onclick="setTab('concepts')">Concepts &amp; Formulas</button>
      <button class="tabbtn ${state.tab==='practice'?'active':''}" onclick="setTab('practice')">Practice Problems</button>
      <button class="tabbtn ${state.tab==='quiz'?'active':''}" onclick="setTab('quiz')">Concept Quiz</button>
    </div>
    <div id="tabcontent"></div>
  `;
  renderTabContent();
}

function renderTabContent(){
  const c = getChapter(state.chapterId);
  const wrap = document.getElementById('tabcontent');
  if(state.tab==='concepts'){
    let conceptsHtml = c.concepts.map(cc=>`
      <div class="card concept-card">
        <h3>${cc.h}</h3>
        ${cc.p.map(p=>`<p>${p}</p>`).join('')}
      </div>
    `).join('');
    let formulaRows = c.formulas.map(f=>`
      <div class="formula-row"><div class="fname">${f.n}</div><div class="fexpr">${f.e}</div></div>
    `).join('');
    wrap.innerHTML = `
      ${conceptsHtml}
      <div class="card">
        <h3 style="font-family:var(--serif);font-size:17px;margin:0 0 4px;color:var(--ink-2);">Formula sheet</h3>
        ${formulaRows}
      </div>
    `;
  } else if(state.tab==='practice'){
    renderPractice(c, wrap);
  } else if(state.tab==='quiz'){
    renderQuiz(wrap);
  }
}

/* =========================================================
   PRACTICE PROBLEMS
   ========================================================= */
function renderPractice(c, wrap){
  if(state.activeGenIdx===null){
    let grid = c.generators.map((g,i)=>`
      <div class="ptype" onclick="startProblem(${i})">
        <div class="num">PROBLEM ${String(i+1).padStart(2,'0')}</div>
        <h4>${g.name}</h4>
        <p>${g.blurb}</p>
      </div>
    `).join('');
    wrap.innerHTML = `<div class="grid">${grid}</div>`;
  } else {
    renderProblemPanel(c, wrap);
  }
}
function startProblem(idx){
  state.activeGenIdx = idx;
  const c = getChapter(state.chapterId);
  state.currentProblem = c.generators[idx].generate();
  render();
}
function newNumbers(){
  const c = getChapter(state.chapterId);
  state.currentProblem = c.generators[state.activeGenIdx].generate();
  render();
}
function backToProblemGrid(){
  state.activeGenIdx=null;
  state.currentProblem=null;
  render();
}
function renderProblemPanel(c, wrap){
  const g = c.generators[state.activeGenIdx];
  const p = state.currentProblem;
  wrap.innerHTML = `
    <div class="back-link" onclick="backToProblemGrid()">← All practice problems</div>
    <div class="problem-panel">
      <div class="kicker">${g.name}</div>
      <div class="prompt">${p.prompt}</div>
      <div class="answer-row">
        <input type="text" id="answerInput" placeholder="Your answer" autocomplete="off" onkeydown="if(event.key==='Enter')checkAnswer()">
        <span class="unit">${p.unit}</span>
      </div>
      <div class="btnrow">
        <button class="btn primary" onclick="checkAnswer()">Check answer</button>
        <button class="btn" onclick="toggleSolution()">Show step-by-step</button>
        <button class="btn ghost" onclick="newNumbers()">↻ New numbers</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="solution" id="solution">
        <ol>${p.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
        <div class="final">${p.final}</div>
      </div>
    </div>
  `;
}
function toggleSolution(){
  document.getElementById('solution').classList.toggle('open');
}
function checkAnswer(){
  const input = document.getElementById('answerInput');
  const val = parseFloat((input.value||'').replace(/[,$%]/g,''));
  const fb = document.getElementById('feedback');
  const p = state.currentProblem;
  if(isNaN(val)){
    fb.className='feedback wrong';
    fb.style.display='block';
    fb.innerHTML = 'Enter a number to check your answer.';
    return;
  }
  const tol = Math.max(Math.abs(p.answer)*0.02, 0.015);
  if(Math.abs(val-p.answer)<=tol){
    fb.className='feedback correct';
    fb.innerHTML = `✓ Correct — nicely done. (${p.final})`;
  } else {
    fb.className='feedback wrong';
    fb.innerHTML = `Not quite. Try again, or click "Show step-by-step" to see exactly where the numbers come from.`;
  }
}

/* Mixed practice: pick a random chapter + generator */
function startMixedPractice(){
  const c = choice(CHAPTERS);
  state.view='chapter';
  state.chapterId=c.id;
  state.tab='practice';
  state.activeGenIdx = randInt(0,c.generators.length-1);
  state.currentProblem = c.generators[state.activeGenIdx].generate();
  render();
}

/* =========================================================
   CONCEPT QUIZ
   ========================================================= */
function startQuiz(chapterId){
  const c = getChapter(chapterId);
  const pool = c.mcq.map((q,i)=>({...q, _i:i})).sort(()=>Math.random()-0.5);
  state.quiz = {pool, idx:0, score:0, answered:false};
}
function renderQuiz(wrap){
  const qz = state.quiz;
  if(qz.idx>=qz.pool.length){
    wrap.innerHTML = `
      <div class="problem-panel" style="text-align:center;">
        <div class="kicker">Quiz complete</div>
        <div class="prompt">You scored <b>${qz.score} / ${qz.pool.length}</b> on this chapter's concept quiz.</div>
        <div class="btnrow" style="justify-content:center;">
          <button class="btn primary" onclick="startQuiz(state.chapterId);render()">↻ Retake quiz</button>
        </div>
      </div>
    `;
    return;
  }
  const q = qz.pool[qz.idx];
  wrap.innerHTML = `
    <div class="quiz-score">Score: ${qz.score} / ${qz.idx}${qz.answered?'':''}</div>
    <div class="problem-panel">
      <div class="quiz-progress">Question ${qz.idx+1} of ${qz.pool.length}</div>
      <div class="quiz-q">${q.q}</div>
      <div id="choices">
        ${q.choices.map((ch,i)=>`<button class="choice" id="choice-${i}" onclick="answerQuiz(${i})">${ch}</button>`).join('')}
      </div>
      <div class="quiz-explain" id="quizExplain">${q.explain}</div>
      <div class="btnrow" style="margin-top:14px;">
        <button class="btn primary" id="nextBtn" style="display:none;" onclick="nextQuiz()">Next question →</button>
      </div>
    </div>
  `;
}
function answerQuiz(i){
  const qz = state.quiz;
  if(qz.answered) return;
  qz.answered = true;
  const q = qz.pool[qz.idx];
  document.querySelectorAll('.choice').forEach((btn,idx)=>{
    btn.setAttribute('disabled','true');
    if(idx===q.correct) btn.classList.add('correct');
    else if(idx===i) btn.classList.add('wrong');
  });
  if(i===q.correct) qz.score++;
  document.getElementById('quizExplain').classList.add('open');
  document.getElementById('nextBtn').style.display='inline-block';
  document.querySelector('.quiz-score').textContent = `Score: ${qz.score} / ${qz.idx+1}`;
}
function nextQuiz(){
  state.quiz.idx++;
  state.quiz.answered=false;
  renderQuiz(document.getElementById('tabcontent'));
}

/* =========================================================
   MAIN RENDER
   ========================================================= */
function render(){
  renderSidebar();
  if(state.view==='home') renderHome();
  else renderChapter();
  window.scrollTo(0,0);
}
render();
</script>
</body>
</html>
